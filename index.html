<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Jejak Karyaku 🎨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <style>
    * {
      font-family: 'Fredoka', sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-overflow-scrolling: touch;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: linear-gradient(135deg, #fff9fb 0%, #fef3f8 100%);
      color: #334155;
      overflow-x: hidden;
    }
    
    .app-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 20px;
    }
    
    .kids-btn {
      border-radius: 20px;
      font-weight: 700;
      font-size: 16px;
      padding: 12px 24px;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    
    .kids-btn:active {
      transform: scale(0.96);
    }
    
    .kids-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #ff6b9d 0%, #ff5a8a 100%);
      color: white;
    }
    
    .btn-secondary {
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      color: white;
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
    }
    
    .art-card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }
    
    .art-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
    }
    
    .art-card.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #ff6b9d 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .emoji-large {
      font-size: 64px;
      display: block;
      margin-bottom: 10px;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }
    
    .modal-box {
      background: white;
      border-radius: 24px;
      padding: 24px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .input-field {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-family: 'Fredoka', sans-serif;
      font-size: 16px;
      transition: all 0.2s ease;
    }
    
    .input-field:focus {
      outline: none;
      border-color: #ff6b9d;
      box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
    }
    
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .badge-pink {
      background: rgba(255, 107, 157, 0.2);
      color: #ff6b9d;
    }
    
    .badge-blue {
      background: rgba(96, 165, 250, 0.2);
      color: #60a5fa;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body>
  <div class="app-wrapper"><!-- Header -->
   <div class="bg-gradient-to-r from-pink-200 via-purple-200 to-blue-200 p-6 shadow-lg">
    <div class="text-center mb-4">
     <h1 class="text-4xl font-bold gradient-text mb-1">🎨 Jejak Karyaku</h1>
     <p class="text-sm text-slate-600">Portfolio Karya Seni Ku</p>
    </div>
    <div class="flex gap-2 justify-center flex-wrap"><button class="kids-btn btn-primary" onclick="showAddArtModal()"> <i data-lucide="plus" style="display: inline; width: 20px; height: 20px; margin-right: 6px; vertical-align: middle;"></i>Karya Baru </button> <button class="kids-btn btn-secondary" onclick="showStatsModal()"> <i data-lucide="bar-chart-3" style="display: inline; width: 20px; height: 20px; margin-right: 6px; vertical-align: middle;"></i>Statistik </button>
    </div>
   </div><!-- Content Area -->
   <div class="content-scroll p-6">
    <div id="artGallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"><!-- Art cards will be rendered here -->
    </div>
    <div id="emptyState" class="art-card empty text-center hidden">
     <div><span class="emoji-large">🎨</span>
      <p class="text-lg font-semibold text-slate-600 mb-2">Belum Ada Karya</p>
      <p class="text-sm text-slate-500">Mulai tambah karya seni mu sekarang!</p>
     </div>
    </div>
   </div>
  </div><!-- Modal: Add/Edit Art -->
  <div id="addArtModal" class="modal-overlay hidden" onclick="if(event.target===this) closeAddArtModal()">
   <div class="modal-box">
    <div class="flex justify-between items-center mb-4">
     <h2 class="text-2xl font-bold gradient-text" id="modalTitle">Tambah Karya Baru</h2><button onclick="closeAddArtModal()" class="text-slate-400 hover:text-slate-600"> <i data-lucide="x" style="width: 28px; height: 28px;"></i> </button>
    </div>
    <form onsubmit="saveArt(event)" id="artForm">
     <div class="mb-4"><label class="block text-sm font-semibold text-slate-700 mb-2">Judul Karya</label> <input type="text" id="artTitle" class="input-field" placeholder="Contoh: Rumahku yang Indah" required>
     </div>
     <div class="mb-4"><label class="block text-sm font-semibold text-slate-700 mb-2">Deskripsi</label> <textarea id="artDescription" class="input-field resize-none" rows="4" placeholder="Ceritakan tentang karya seni mu..."></textarea>
     </div>
     <div class="mb-4"><label class="block text-sm font-semibold text-slate-700 mb-2">Jenis Karya</label> <select id="artType" class="input-field"> <option value="lukisan">🖌️ Lukisan</option> <option value="gambar">✏️ Gambar</option> <option value="kolase">📄 Kolase</option> <option value="patung">🗿 Patung</option> <option value="lainnya">⭐ Lainnya</option> </select>
     </div>
     <div class="mb-6"><label class="block text-sm font-semibold text-slate-700 mb-2">Rating Karya</label>
      <div class="flex gap-2"><button type="button" class="star-btn text-2xl opacity-30" data-rating="1">⭐</button> <button type="button" class="star-btn text-2xl opacity-30" data-rating="2">⭐</button> <button type="button" class="star-btn text-2xl opacity-30" data-rating="3">⭐</button> <button type="button" class="star-btn text-2xl opacity-30" data-rating="4">⭐</button> <button type="button" class="star-btn text-2xl opacity-30" data-rating="5">⭐</button>
      </div><input type="hidden" id="artRating" value="0">
     </div>
     <div class="flex gap-3"><button type="button" class="kids-btn btn-secondary flex-1" onclick="closeAddArtModal()">Batal</button> <button type="submit" class="kids-btn btn-primary flex-1" id="submitBtn"> <i data-lucide="save" style="display: inline; width: 18px; height: 18px; margin-right: 4px; vertical-align: middle;"></i>Simpan Karya </button>
     </div>
    </form>
   </div>
  </div><!-- Modal: Statistics -->
  <div id="statsModal" class="modal-overlay hidden" onclick="if(event.target===this) closeStatsModal()">
   <div class="modal-box">
    <div class="flex justify-between items-center mb-4">
     <h2 class="text-2xl font-bold gradient-text">📊 Statistik Karya</h2><button onclick="closeStatsModal()" class="text-slate-400 hover:text-slate-600"> <i data-lucide="x" style="width: 28px; height: 28px;"></i> </button>
    </div>
    <div id="statsContent" class="space-y-4"><!-- Stats will be rendered here -->
    </div><button class="kids-btn btn-secondary w-full mt-6" onclick="closeStatsModal()">Tutup</button>
   </div>
  </div>
  <script>
    let arts = [];
    let editingId = null;

    async function initApp() {
      const dataHandler = {
        onDataChanged(data) {
          arts = data || [];
          renderGallery();
        }
      };

      const initResult = await window.dataSdk.init(dataHandler);
      if (!initResult.isOk) {
        console.error('Failed to initialize data SDK');
        arts = [];
        renderGallery();
      }

      lucide.createIcons();

      document.querySelectorAll('.star-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const rating = btn.dataset.rating;
          document.getElementById('artRating').value = rating;
          document.querySelectorAll('.star-btn').forEach((b, idx) => {
            b.classList.toggle('opacity-30', (idx + 1) > rating);
            b.classList.toggle('opacity-100', (idx + 1) <= rating);
          });
        });
      });
    }

    function renderGallery() {
      const gallery = document.getElementById('artGallery');
      const emptyState = document.getElementById('emptyState');
      
      if (arts.length === 0) {
        gallery.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      gallery.innerHTML = arts.map(art => `
        <div class="art-card">
          <div class="flex justify-between items-start mb-3">
            <div class="flex-1">
              <h3 class="text-lg font-bold text-slate-800 mb-1">${art.title}</h3>
              <div class="flex gap-2 flex-wrap">
                <span class="badge badge-pink">${getTypeEmoji(art.type)} ${art.type}</span>
                <span class="badge badge-blue">${'⭐'.repeat(parseInt(art.rating))}</span>
              </div>
            </div>
            <button onclick="deleteArt('${art.__backendId}')" class="text-slate-400 hover:text-red-500 transition">
              <i data-lucide="trash-2" style="width: 20px; height: 20px;"></i>
            </button>
          </div>
          <p class="text-sm text-slate-600 mb-4 line-clamp-3">${art.description}</p>
          <div class="flex gap-2">
            <button class="flex-1 kids-btn btn-secondary" onclick="editArt('${art.__backendId}')">
              <i data-lucide="edit" style="display: inline; width: 16px; height: 16px; margin-right: 4px; vertical-align: middle;"></i>Edit
            </button>
            <button class="flex-1 kids-btn btn-primary" onclick="viewArt('${art.__backendId}')">
              <i data-lucide="eye" style="display: inline; width: 16px; height: 16px; margin-right: 4px; vertical-align: middle;"></i>Lihat
            </button>
          </div>
        </div>
      `).join('');
      
      lucide.createIcons();
    }

    function getTypeEmoji(type) {
      const emojis = {
        lukisan: '🖌️',
        gambar: '✏️',
        kolase: '📄',
        patung: '🗿',
        lainnya: '⭐'
      };
      return emojis[type] || '⭐';
    }

    function showAddArtModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Tambah Karya Baru';
      document.getElementById('artForm').reset();
      document.getElementById('artRating').value = '0';
      document.querySelectorAll('.star-btn').forEach(btn => {
        btn.classList.add('opacity-30');
        btn.classList.remove('opacity-100');
      });
      document.getElementById('addArtModal').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeAddArtModal() {
      document.getElementById('addArtModal').classList.add('hidden');
    }

    async function saveArt(e) {
      e.preventDefault();
      
      const title = document.getElementById('artTitle').value;
      const description = document.getElementById('artDescription').value;
      const type = document.getElementById('artType').value;
      const rating = document.getElementById('artRating').value;

      if (!title.trim()) {
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;

      const artData = {
        title: title.trim(),
        description: description.trim(),
        type: type,
        rating: rating,
        created_at: new Date().toISOString()
      };

      if (editingId) {
        const artToUpdate = arts.find(a => a.__backendId === editingId);
        if (artToUpdate) {
          const result = await window.dataSdk.update({
            ...artToUpdate,
            ...artData
          });
          if (!result.isOk) {
            console.error('Failed to update art');
          }
        }
      } else {
        const result = await window.dataSdk.create(artData);
        if (!result.isOk) {
          console.error('Failed to create art');
        }
      }

      submitBtn.disabled = false;
      closeAddArtModal();
    }

    function editArt(id) {
      const art = arts.find(a => a.__backendId === id);
      if (!art) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Karya';
      document.getElementById('artTitle').value = art.title;
      document.getElementById('artDescription').value = art.description;
      document.getElementById('artType').value = art.type;
      document.getElementById('artRating').value = art.rating;

      document.querySelectorAll('.star-btn').forEach((btn, idx) => {
        if ((idx + 1) <= art.rating) {
          btn.classList.remove('opacity-30');
          btn.classList.add('opacity-100');
        } else {
          btn.classList.add('opacity-30');
          btn.classList.remove('opacity-100');
        }
      });

      document.getElementById('addArtModal').classList.remove('hidden');
      lucide.createIcons();
    }

    async function deleteArt(id) {
      const art = arts.find(a => a.__backendId === id);
      if (!art) return;

      const confirmed = confirm('Yakin ingin menghapus karya ini?');
      if (!confirmed) return;

      const result = await window.dataSdk.delete(art);
      if (!result.isOk) {
        console.error('Failed to delete art');
      }
    }

    function viewArt(id) {
      const art = arts.find(a => a.__backendId === id);
      if (!art) return;

      const statsContent = document.getElementById('statsContent');
      statsContent.innerHTML = `
        <div class="mb-4">
          <h3 class="text-xl font-bold text-slate-800 mb-2">${art.title}</h3>
          <p class="text-sm text-slate-600 mb-4">${art.description}</p>
          <div class="flex gap-2 mb-4">
            <span class="badge badge-pink">${getTypeEmoji(art.type)} ${art.type}</span>
            <span class="badge badge-blue">${'⭐'.repeat(parseInt(art.rating))}</span>
          </div>
        </div>
      `;
      document.getElementById('statsModal').classList.remove('hidden');
      lucide.createIcons();
    }

    function showStatsModal() {
      const statsContent = document.getElementById('statsContent');
      
      if (arts.length === 0) {
        statsContent.innerHTML = '<p class="text-center text-slate-500">Belum ada karya untuk ditampilkan statistik.</p>';
      } else {
        const totalArts = arts.length;
        const avgRating = (arts.reduce((sum, a) => sum + parseInt(a.rating), 0) / totalArts).toFixed(1);
        const typeCount = {};
        arts.forEach(art => {
          typeCount[art.type] = (typeCount[art.type] || 0) + 1;
        });

        const typeStats = Object.entries(typeCount).map(([type, count]) => 
          `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-lg">
            <span>${getTypeEmoji(type)} ${type}</span>
            <span class="font-bold text-slate-800">${count} karya</span>
          </div>`
        ).join('');

        statsContent.innerHTML = `
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-gradient-to-br from-pink-100 to-pink-200 p-4 rounded-lg text-center">
              <div class="text-3xl font-bold gradient-text">${totalArts}</div>
              <div class="text-xs text-slate-600">Total Karya</div>
            </div>
            <div class="bg-gradient-to-br from-blue-100 to-blue-200 p-4 rounded-lg text-center">
              <div class="text-3xl font-bold" style="color: #60a5fa;">${avgRating}</div>
              <div class="text-xs text-slate-600">Rating Rata-rata</div>
            </div>
          </div>
          <div class="mb-4">
            <h3 class="font-bold text-slate-800 mb-3">Breakdown Jenis Karya:</h3>
            ${typeStats}
          </div>
        `;
      }

      document.getElementById('statsModal').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeStatsModal() {
      document.getElementById('statsModal').classList.add('hidden');
    }

    initApp();
  </script>
